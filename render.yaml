services:
  - type: web
    name: linklabour-backend
    env: node
    plan: free
    region: oregon
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: linklabour-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://linklabour-frontend.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false   # set manually in Render dashboard

  - type: static
    name: linklabour-frontend
    plan: free
    region: oregon
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://linklabour-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://linklabour-backend.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false   # set manually in Render dashboard
