services:
  - type: web
    name: linklabour-backend
    env: node
    plan: free
    region: oregon
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: linklabour-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://linklabour-frontend.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false   # set manually in Render dashboard

databases:
  - name: linklabour-db
    plan: free
    region: oregon
