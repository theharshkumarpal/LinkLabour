services:
  - type: web
    name: linklabour-backend
    env: node
    plan: free
    region: oregon
    buildCommand: "cd backend && npm install && npm run build && npx prisma db push"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false   # set manually — paste your Neon/Supabase connection string
      - key: FRONTEND_URL
        sync: false   # set manually — e.g. https://yourdomain.com
      - key: GOOGLE_CLIENT_ID
        sync: false   # set manually — your Google OAuth client ID (optional)
